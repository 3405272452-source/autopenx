[importlinter]
# Root packages that import-linter analyzes. We declare every layer of the
# cet4_app package so import paths are resolved correctly under the src-layout.
root_packages =
    cet4_app
    cet4_app.domain
    cet4_app.application
    cet4_app.infrastructure
    cet4_app.ui
include_external_packages = True

# ---------------------------------------------------------------------------
# Contract 1: the domain layer must be pure Python.
#
# The domain layer hosts every pydantic model and every correctness Property
# target (hypothesis PBT). It must not touch Qt, HTTP, or the ORM — doing so
# would force Qt/SQLAlchemy/httpx into the PBT runtime path and violates
# design.md's layering rules.
# ---------------------------------------------------------------------------
[importlinter:contract:domain-is-pure]
name = domain must not import UI/HTTP/ORM stacks
type = forbidden
source_modules =
    cet4_app.domain
forbidden_modules =
    PySide6
    httpx
    sqlalchemy
ignore_imports =

# ---------------------------------------------------------------------------
# Contract 2: the application layer coordinates services but does not own UI.
#
# Widgets, windows, and signals live under cet4_app.ui. The application layer
# must remain headless so it is testable without a running Qt event loop.
# ---------------------------------------------------------------------------
[importlinter:contract:application-no-ui]
name = application must not import PySide6
type = forbidden
source_modules =
    cet4_app.application
forbidden_modules =
    PySide6
ignore_imports =
