name: AutoPenX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        python -m pytest tests/ -x --tb=short -q \
          --ignore=tests/benchmark/ \
          --ignore=tests/performance/ \
          -m "not benchmark and not slow"

    - name: Run regression tests
      run: |
        python -m pytest tests/test_regression.py -v --tb=short

    - name: Check imports
      run: |
        python -c "import autopnex; import autopnex.agents; import autopnex.evasion"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - run: pip install ruff
    - run: ruff check autopnex/ --select E,F,W --ignore E501

  security-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - run: pip install -r requirements.txt
    - run: python -m pytest tests/test_security_boundaries.py -v --tb=short

  e2e-baseline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run E2E baseline tests
      run: |
        python -m pytest tests/benchmark/test_web_e2e_baseline.py -v
