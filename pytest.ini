[pytest]
markers =
    benchmark: marks tests as benchmark (requires Docker targets)
    strict_benchmark: strict web benchmark — real LLM, must find flag
    explore_benchmark: exploratory web benchmark on unregistered targets — diagnoses capability gaps, never fails
    real_ctf: real CTF challenge simulation — tests against BUUCTF-style challenges
    medium_ctf: medium difficulty CTF challenges (difficulty 2-3)
    llm_required: requires LLM API key (difficulty-3 challenges)
    slow: marks tests as slow-running
    phase2: Phase 2 LLM racing tests
    race: race condition tests (threading)
    security: marks security boundary tests
    requires_deepseek: marks tests requiring DeepSeek API availability
    dvwa: marks tests requiring a running DVWA target
    requires_docker: marks tests requiring Docker
    integration: marks integration tests

testpaths = tests

# Hypothesis profiles are registered in tests/conftest.py:
#   - default  (local dev)
#   - dev      (quick local loop, fewer examples)
#   - ci       (derandomize=True, max_examples=200, deadline=500)
# Select via `pytest --hypothesis-profile=ci`.

addopts = -ra --strict-markers -m "not llm_required and not slow"
